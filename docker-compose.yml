services:
  mariadb:
    image: mariadb:10.11
    container_name: homa-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: ${DB_NAME:-homa_avanzada_db}
      MARIADB_USER: ${DB_USERNAME:-homa_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-homa_password}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  prometheus:
    image: prom/prometheus:latest
    container_name: homa-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: homa-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}

volumes:
  mariadb_data:
