# ---------------------------------------
# CONFIGURACION GENERAL
# ---------------------------------------
spring.application.name=Homa
server.port=8081

# ---------------------------------------
# CONFIGURACION BASE DE DATOS MARIADB
# ---------------------------------------
spring.datasource.url=jdbc:mariadb://${DB_HOST:38.242.225.58}:${DB_PORT:3306}/${DB_NAME:homa_avanzada_db}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:homa_user}
spring.datasource.password=${DB_PASSWORD:emili_password_homa}


# Propiedades de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------
# SWAGGER / OPENAPI
# ---------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.default-model-expand-depth=1
springdoc.swagger-ui.default-models-expand-depth=1
springdoc.swagger-ui.display-request-duration=true

# URLs para OpenAPI
openapi.dev-url=${OPENAPI_DEV_URL:http://localhost:8081}
openapi.prod-url=${OPENAPI_PROD_URL:https://api.homa.edu.co}

# ---------------------------------------
# JWT CONFIGURACION
# ---------------------------------------
jwt.secret=${JWT_SECRET:development-secret-key-not-for-production-change-in-production}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ---------------------------------------
# CORREO ELECTRONICO (SMTP)
# ---------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:alojamientohoma@gmail.com}
spring.mail.password=${MAIL_PASSWORD:mbib geat hzce luev}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend.url=${FRONTEND_BASE_URL:http://localhost:4200}
app.backend.url=${BACKEND_BASE_URL:http://localhost:8081}

# CORS CONFIGURACION
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ---------------------------------------
# MAPBOX CONFIGURACION
# ---------------------------------------
mapbox.access-token=${MAPBOX_TOKEN:your-mapbox-token-here}

# ---------------------------------------
# CLOUDINARY CONFIGURACION
# ---------------------------------------
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}
cloudinary.folder=${CLOUDINARY_FOLDER:alojamientos}

# ---------------------------------------
# CONFIGURACION DE CARGA DE ARCHIVOS
# ---------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ---------------------------------------
# ACTUATOR + MICROMETER PROMETHEUS
# ---------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true

# Nombre de la aplicación en las métricas (aparece en Grafana)
management.metrics.tags.application=homa-backend
management.metrics.tags.environment=${SPRING_PROFILES_ACTIVE:development}

# Habilitar métricas de HTTP por endpoint (esencial para dashboards de carga)
management.metrics.web.server.request.autotime.enabled=true
management.metrics.web.server.request.autotime.percentiles=0.5,0.75,0.95,0.99
management.metrics.web.server.request.autotime.percentiles-histogram=true

# Distribución de latencias (para histogramas en Grafana)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1000ms

# Métricas de JVM y pool de conexiones
management.metrics.enable.jvm=true
management.metrics.enable.hikaricp=true
management.metrics.enable.process=true

# ---------------------------------------
# MERCADO PAGO CONFIGURACION
# ---------------------------------------
mercadopago.access_token=${MERCADO_PAGO_ACCESS_TOKEN:your-access-token-here}
mercadopago.public_key=${MERCADO_PAGO_PUBLIC_KEY:your-public-key-here}

