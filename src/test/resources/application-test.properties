# Perfil de pruebas — no requiere BD real (tests unitarios con Mockito)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Desactivar Actuator/Prometheus en tests
management.endpoints.enabled-by-default=false

# JWT config para tests
jwt.secret=homa-test-secret-key-for-unit-tests-only-32chars
jwt.expiration=3600000

# Desactivar envío de emails en tests
spring.mail.host=localhost
spring.mail.port=3025
