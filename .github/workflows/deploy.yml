name: Backend Deployment (Azure App Service)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x gradlew

      - name: Run automated tests
        run: ./gradlew test --tests "poo.uniquindio.edu.co.Homa.service.*"
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-html
          path: build/reports/tests/test/

      - name: Upload JUnit XML results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-xml
          path: build/test-results/test/

      - name: Report results to TestRail
        if: always()
        env:
          TESTRAIL_URL: https://homauqsoft.testrail.io
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USERNAME }}
          TESTRAIL_KEY: ${{ secrets.TESTRAIL_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          GIT_SHA: ${{ github.sha }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, base64

          url = os.environ['TESTRAIL_URL']
          user = os.environ['TESTRAIL_USER']
          key = os.environ['TESTRAIL_KEY']
          status = os.environ['JOB_STATUS']
          sha = os.environ['GIT_SHA']

          print(f"URL: {url}")
          print(f"User length: {len(user)}")
          print(f"Key length: {len(key)}")
          print(f"User starts with: {user[:5]}...")

          status_id = 1 if status == 'success' else 5
          comment = f"GitHub Actions CI/CD. Status: {status}. Commit: {sha[:8]}. 35 tests JUnit 5."

          # TestRail usa email:api_key en Basic Auth
          credentials = f"{user}:{key}"
          token = base64.b64encode(credentials.encode('utf-8')).decode('utf-8')
          print(f"Token base64 length: {len(token)}")

          headers = {
              'Content-Type': 'application/json',
              'Authorization': f'Basic {token}'
          }

          # Test de conexión primero
          try:
              req = urllib.request.Request(
                  f"{url}/index.php?/api/v2/get_projects",
                  headers=headers
              )
              with urllib.request.urlopen(req) as resp:
                  print(f"Conexion exitosa: {resp.status}")
          except Exception as e:
              print(f"Error de conexion: {e}")

          run_ids = [13, 14, 15, 16]

          for run_id in run_ids:
              print(f"Actualizando run {run_id}...")
              try:
                  req = urllib.request.Request(
                      f"{url}/index.php?/api/v2/get_tests/{run_id}",
                      headers=headers
                  )
                  with urllib.request.urlopen(req) as resp:
                      data = json.loads(resp.read())
                  tests = data.get('tests', [])
                  print(f"  Tests encontrados: {len(tests)}")
                  results = [{'case_id': t['case_id'], 'status_id': status_id, 'comment': comment} for t in tests]
                  payload = json.dumps({'results': results}).encode()
                  req2 = urllib.request.Request(
                      f"{url}/index.php?/api/v2/add_results_for_cases/{run_id}",
                      data=payload,
                      headers=headers,
                      method='POST'
                  )
                  with urllib.request.urlopen(req2) as resp2:
                      print(f"  Run {run_id} actualizado OK: {resp2.status}")
              except Exception as e:
                  print(f"  Error en run {run_id}: {e}")

          print("Proceso finalizado")
          PYEOF

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Get executable JAR name
        run: |
          JAR_NAME=$(ls build/libs/*.jar | grep -v "plain" | head -n 1)
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV
          echo "Deploying JAR: $JAR_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ${{ env.JAR_NAME }}

  deploy:
    name: Deploy to Azure App Service
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Get JAR filename
        run: |
          JAR_FILE=$(ls *.jar | head -n 1)
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Deploying: $JAR_FILE"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          package: ${{ env.JAR_FILE }}
