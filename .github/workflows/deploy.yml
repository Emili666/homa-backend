name: Backend Deployment (Azure App Service)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x gradlew

      - name: Run automated tests
        run: ./gradlew test --tests "poo.uniquindio.edu.co.Homa.service.*"
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-html
          path: build/reports/tests/test/

      - name: Upload JUnit XML results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-xml
          path: build/test-results/test/

      - name: Report results to TestRail
        if: always()
        env:
          TESTRAIL_URL: https://homauqsoft.testrail.io
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USERNAME }}
          TESTRAIL_KEY: ${{ secrets.TESTRAIL_API_KEY }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_ID=1
            COMMENT="Ejecutado automaticamente via GitHub Actions. 35 tests, 0 failures, 100% successful. Commit: ${{ github.sha }}"
          else
            STATUS_ID=5
            COMMENT="Fallo en GitHub Actions. Commit: ${{ github.sha }}"
          fi

          update_run() {
            RUN_ID=$1
            echo "Actualizando run $RUN_ID..."

            AUTH=$(echo -n "${TESTRAIL_USER}:${TESTRAIL_KEY}" | base64 -w 0)

            TESTS=$(curl -s \
              -H "Content-Type: application/json" \
              -H "Authorization: Basic ${AUTH}" \
              "${TESTRAIL_URL}/index.php?/api/v2/get_tests/${RUN_ID}")

            echo "Tests obtenidos: $TESTS"

            PAYLOAD=$(echo "$TESTS" | python3 -c "
import sys, json
data = json.load(sys.stdin)
tests = data.get('tests', [])
results = [{'case_id': t['case_id'], 'status_id': $STATUS_ID, 'comment': '$COMMENT'} for t in tests]
print(json.dumps({'results': results}))
            ")

            echo "Payload: $PAYLOAD"

            RESPONSE=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Basic ${AUTH}" \
              "${TESTRAIL_URL}/index.php?/api/v2/add_results_for_cases/${RUN_ID}" \
              -d "$PAYLOAD")

            echo "Respuesta TestRail run $RUN_ID: $RESPONSE"
          }

          update_run 13
          update_run 14
          update_run 15
          update_run 16
          echo "TestRail actualizado"

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Get executable JAR name
        run: |
          JAR_NAME=$(ls build/libs/*.jar | grep -v "plain" | head -n 1)
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV
          echo "Deploying JAR: $JAR_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ${{ env.JAR_NAME }}

  deploy:
    name: Deploy to Azure App Service
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Get JAR filename
        run: |
          JAR_FILE=$(ls *.jar | head -n 1)
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Deploying: $JAR_FILE"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          package: ${{ env.JAR_FILE }}
