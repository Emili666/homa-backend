global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'homa-backend'
    metrics_path: '/actuator/prometheus'
    scheme: 'http'
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          app: 'homa-backend'
          environment: 'local'
